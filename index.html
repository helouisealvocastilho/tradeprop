<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeProp.io</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c0f;--s:#111318;--b:#1f2530;--a:#00e5a0;--t:#e8edf5;--m:#5a6478;--m2:#3a4155}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'DM Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--b) 1px,transparent 1px),linear-gradient(90deg,var(--b) 1px,transparent 1px);background-size:40px 40px;opacity:.35;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(0,229,160,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--b);background:rgba(10,12,15,.9);flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-.5px}
.logo span{color:var(--a)}
.badge{font-size:9px;color:var(--a);border:1px solid rgba(0,229,160,.4);padding:3px 8px;letter-spacing:2px;text-transform:uppercase}
.firms{position:relative;z-index:10;display:flex;align-items:center;gap:6px;padding:8px 28px;border-bottom:1px solid var(--b);background:rgba(17,19,24,.8);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.firms::-webkit-scrollbar{display:none}
.fl{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:2px;white-space:nowrap;margin-right:4px}
.fc{font-size:10px;padding:3px 10px;border:1px solid var(--b);color:var(--m);white-space:nowrap;cursor:pointer;transition:all .2s;background:var(--s);font-family:'DM Mono',monospace}
.fc:hover{border-color:var(--a);color:var(--a);background:rgba(0,229,160,.05)}
.main{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto;padding:0 20px;min-height:0}
.chat{flex:1;overflow-y:auto;padding:28px 0 12px;display:flex;flex-direction:column;gap:18px;scrollbar-width:thin;scrollbar-color:var(--b) transparent;min-height:0}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:var(--b)}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;padding:20px 0;flex:1}
.wi{width:60px;height:60px;border:1px solid var(--a);display:flex;align-items:center;justify-content:center;font-size:26px;position:relative}
.wi::before{content:'';position:absolute;inset:-5px;border:1px solid rgba(0,229,160,.15)}
.welcome h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1.2;letter-spacing:-1px}
.welcome h1 em{color:var(--a);font-style:normal}
.welcome p{font-size:12px;color:var(--m);max-width:380px;line-height:1.7}
.qq{display:flex;flex-direction:column;gap:7px;width:100%;max-width:480px}
.q{padding:11px 14px;border:1px solid var(--b);background:var(--s);color:var(--t);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:center;gap:8px}
.q:hover{border-color:var(--a);background:rgba(0,229,160,.04)}
.q .ar{color:var(--a);margin-left:auto;opacity:0;transition:opacity .2s}
.q:hover .ar{opacity:1}
.msg{display:flex;gap:12px;animation:fadeUp .25s ease}
.msg.u{flex-direction:row-reverse}
.av{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1px solid var(--b);color:var(--m);font-family:'Syne',sans-serif}
.msg.u .av{background:var(--a);color:var(--bg);border-color:var(--a)}
.bub{max-width:80%;padding:12px 16px;font-size:12.5px;line-height:1.75;border:1px solid var(--b);background:var(--s);color:var(--t)}
.msg.u .bub{background:rgba(0,229,160,.06);border-color:rgba(0,229,160,.2)}
.bub strong{color:var(--a);font-weight:500}
.typing{display:flex;gap:12px}
.dots{padding:14px 18px;border:1px solid var(--b);background:var(--s);display:flex;gap:5px;align-items:center}
.dots span{width:6px;height:6px;background:var(--a);border-radius:50%;animation:pulse 1.2s infinite;opacity:.4}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
.inp{padding:12px 0 20px;flex-shrink:0}
.ir{display:flex;border:1px solid var(--b);background:var(--s);transition:border-color .2s}
.ir:focus-within{border-color:var(--a)}
#ui{flex:1;background:transparent;border:none;outline:none;padding:13px 16px;font-family:'DM Mono',monospace;font-size:12.5px;color:var(--t);resize:none;min-height:48px;max-height:110px}
#ui::placeholder{color:var(--m)}
#sb{width:48px;background:var(--a);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--bg);font-size:18px;flex-shrink:0;transition:background .2s}
#sb:hover{background:#00c988}
#sb:disabled{background:var(--m2);cursor:not-allowed}
.hint{font-size:9px;color:var(--m);text-align:center;margin-top:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
</style>
</head>
<body>
<header>
  <div class="logo">Trade<span>Prop</span>.io</div>
  <div class="badge">Beta · PT/BR</div>
</header>
<div class="firms">
  <span class="fl">Firms:</span>
  <button class="fc" onclick="af('Apex')">Apex</button>
  <button class="fc" onclick="af('Bulenox')">Bulenox</button>
  <button class="fc" onclick="af('Topstep')">Topstep</button>
  <button class="fc" onclick="af('Alpha Futures')">Alpha Futures</button>
  <button class="fc" onclick="af('Tradeify')">Tradeify</button>
  <button class="fc" onclick="af('Take Profit Trader')">Take Profit Trader</button>
  <button class="fc" onclick="af('Tradefy')">Tradefy</button>
  <button class="fc" onclick="af('Blue Sky')">Blue Sky</button>
</div>
<div class="main">
  <div class="chat" id="chat">
    <div class="welcome" id="wlc">
      <div class="wi">📊</div>
      <h1>Regras de prop trading<br><em>mastigadas pra você.</em></h1>
      <p>Pergunte sobre Apex, Bulenox, Topstep e mais 5 firms — em português, direto ao ponto.</p>
      <div class="qq">
        <button class="q" onclick="sq('Qual o drawdown da Apex e como funciona?')"><span>Qual o drawdown da Apex e como funciona?</span><span class="ar">↗</span></button>
        <button class="q" onclick="sq('Qual a melhor firm para quem está começando?')"><span>Qual a melhor firm para quem está começando?</span><span class="ar">↗</span></button>
        <button class="q" onclick="sq('Como funciona o payout da Bulenox?')"><span>Como funciona o payout da Bulenox?</span><span class="ar">↗</span></button>
        <button class="q" onclick="sq('Qual firm tem a regra de consistência mais fácil?')"><span>Qual firm tem a regra de consistência mais fácil?</span><span class="ar">↗</span></button>
      </div>
    </div>
  </div>
  <div class="inp">
    <div class="ir">
      <textarea id="ui" placeholder="Pergunta sobre qualquer firm..." rows="1"></textarea>
      <button id="sb" onclick="send()">↑</button>
    </div>
    <div class="hint">TradeProp.io · Sempre verifique o site oficial de cada firm</div>
  </div>
</div>
<script>
let H=[],L=false;
async function send(){
  const i=document.getElementById('ui');
  const t=i.value.trim();
  if(!t||L)return;
  i.value='';i.style.height='auto';
  const w=document.getElementById('wlc');
  if(w)w.remove();
  addMsg('u',t);
  H.push({role:'user',content:t});
  showDots();L=true;
  document.getElementById('sb').disabled=true;
  try{
    const r=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:H})
    });
    const d=await r.json();
    const rep=d?.reply||'Erro. Tente novamente.';
    H.push({role:'assistant',content:rep});
    hideDots();addMsg('b',rep);
  }catch(e){hideDots();addMsg('b','❌ Erro ao conectar. Tente novamente.');}
  L=false;document.getElementById('sb').disabled=false;
}
function addMsg(r,t){
  const c=document.getElementById('chat');
  const d=document.createElement('div');
  d.className='msg'+(r==='u'?' u':'');
  const av=document.createElement('div');
  av.className='av';av.textContent=r==='u'?'EU':'TP';
  const b=document.createElement('div');
  b.className='bub';
  b.innerHTML=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n{2,}/g,'<br><br>').replace(/\n/g,'<br>');
  d.appendChild(av);d.appendChild(b);c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}
function showDots(){
  const c=document.getElementById('chat');
  const d=document.createElement('div');
  d.className='typing';d.id='dots';
  d.innerHTML='<div class="av">TP</div><div class="dots"><span></span><span></span><span></span></div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function hideDots(){const e=document.getElementById('dots');if(e)e.remove();}
function sq(t){document.getElementById('ui').value=t;send();}
function af(f){sq('Me explica as regras principais da '+f);}
document.getElementById('ui').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById('ui').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px';});
</script>
</body>
</html>
